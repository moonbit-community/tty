name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          echo "MOON_HOME=$HOME/.moon" >> "$GITHUB_ENV"

      - name: Install MoonBit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MOON_HOME=$env:USERPROFILE\.moon" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show MoonBit version
        run: moon version --all

      - name: Update package registry
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Check packages
        run: moon check

      - name: Run tests
        run: moon test

      - name: Generate interfaces
        run: moon info

      - name: Verify generated files are current
        run: git diff --exit-code
